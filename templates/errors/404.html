<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><title>404 — Not Found</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=JetBrains+Mono&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0a0f;--accent:#f0a500;--text:#e8e8f0;--muted:#6b6b80;}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;
  min-height:100vh;display:flex;align-items:center;justify-content:center;text-align:center;}
.code{font-family:'JetBrains Mono',monospace;font-size:96px;font-weight:700;
  background:linear-gradient(135deg,#f0a500,#e05c00);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1;}
h1{font-size:22px;margin:16px 0 8px;}
p{color:var(--muted);font-size:14px;margin-bottom:28px;}
a{display:inline-block;background:linear-gradient(135deg,#f0a500,#e05c00);color:#000;
  font-weight:700;padding:12px 28px;border-radius:9px;text-decoration:none;font-size:14px;}
</style>
</head>
<body>
<div>
  <div class="code">404</div>
  <h1>Page not found</h1>
  <p>The page you're looking for doesn't exist.</p>
  <a href="/">← Go Home</a>
</div>
</body>
</html>
