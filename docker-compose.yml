version: "3.9"

services:
  # ── Flask App ──────────────────────────────────────────────────────
  web:
    build: .
    container_name: matrimony_web
    restart: unless-stopped
    ports:
      - "5000:5000"
    volumes:
      - ./input:/app/input
      - ./output:/app/output
      - ./logs:/app/logs
      - ./data:/app/data
    env_file:
      - .env
    environment:
      FLASK_ENV: production
      DATABASE_URL: sqlite:////app/data/matrimony.db
    depends_on:
      - redis

  # ── Redis (for future Celery task queue) ──────────────────────────
  redis:
    image: redis:7-alpine
    container_name: matrimony_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  # ── Nginx reverse proxy ───────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: matrimony_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./static:/app/static:ro
    depends_on:
      - web

volumes:
  redis_data:
